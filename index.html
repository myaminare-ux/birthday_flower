<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="생일, 탄생화, 꽃, 꽃말">
    <meta name="description" content="자신의 생일 탄생화가 궁금하신 분들 어서오세요. 꽃 종류부터 꽃말까지 세세하게 알려드립니다.">
    <title>나의 탄생화 찾기</title>
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/10157/10157131.png" type="image/x-icon">
    <!-- 웹 글꼴 -->
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <main>
        <div class="title">
            <p>The Flower of My Birth Day</p>
            <h1>나의 탄생화 찾기</h1>
        </div><!-- e:title -->
        <div class="contents">
            <input id="user_birthday" placeholder="태어난 달을 숫자로 입력해주세요">
            <button id="birthday_result_btn">나의 꽃과 꽃말 만나기</button>
            <!-- a 태그는 클릭 시 다른 페이지로 이동 -->
            <!-- button 태그 클릭 시 범용 기능 동적 표현 -->
        </div>
    </main>
</body>
</html>
